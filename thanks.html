<!-- Google tag (gtag.js) : GA4 + Google広告 共通 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');   // GA4 測定ID
  gtag('config', 'AW-XXXXXXXXXX');  // Google広告 コンバージョンID
</script>
<!-- Meta Pixel -->
<script>
  !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
  n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', 'XXXXXXXXXXXXXXX');   // Meta Pixel ID
  fbq('track', 'PageView');
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script>

<body class="font-sans antialiased">
<main class="min-h-[100dvh] grid place-items-center px-4 py-12 bg-gradient-to-b from-forest-900 to-forest-950">

      <h1 class="mt-6 font-display font-bold text-2xl md:text-3xl text-forest-900 leading-snug">ご予約ありがとうございます</h1>
      <p class="mt-4 text-ink/70 leading-relaxed">
        お申し込みを受け付けました。担当者より、ご記入いただいた連絡先に追ってご連絡いたします。<br class="hidden sm:block">
        今日が、毎月の支払いから解放される最初の一歩です。
      </p>

      <div class="mt-7 rounded-2xl bg-forest-50 p-5 text-left">
        <p class="font-bold text-ink mb-3">このあとの流れ</p>
        <ul class="grid gap-2 text-sm text-ink/75">
          <li class="flex gap-2"><span class="text-amber-600 font-bold">1.</span>担当者からご連絡（お電話またはメール）</li>

      <p class="mt-6 text-xs text-ink/50">完全予約制・相談無料・秘密厳守。しつこい勧誘は一切いたしません。</p>

      <a href="./" class="mt-7 inline-flex justify-center items-center rounded-full bg-amber-500 hover:bg-amber-600 text-forest-950 font-bold px-7 py-3.5 shadow-soft transition active:scale-[.98]">
        トップにもどる
      </a>
    </div>
  </div>
</main>

<script>
  // 申込完了ページの表示＝コンバージョン発火
  try {
    if (typeof gtag === 'function') {
      gtag('event', 'conversion', { send_to: 'AW-XXXXXXXXXX/xxxxxxxxxxxxxxx' }); // Google広告
      gtag('event', 'generate_lead', { value: 1, currency: 'JPY' });             // GA4
    }
  } catch (e) {}
  try { if (typeof fbq === 'function') { fbq('track', 'Lead'); } } catch (e) {}
</script>
