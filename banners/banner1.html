<!doctype html>
<html lang="ja"><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#ccc}
  .banner{width:1080px;height:1080px;position:relative;overflow:hidden;background:#0F3D38;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;display:flex;flex-direction:column}
  /* 上：写真 */
  .photo{position:relative;height:600px;flex:none}
  .photo .bgimg{width:100%;height:100%;object-fit:cover;object-position:50% 38%;display:block}
  .topgrad{position:absolute;top:0;left:0;right:0;height:200px;background:linear-gradient(180deg,rgba(10,44,40,.55),transparent)}
  .logo{position:absolute;top:46px;left:64px;height:54px;filter:brightness(0) invert(1)}
  .fade{position:absolute;left:0;right:0;bottom:0;height:160px;background:linear-gradient(180deg,transparent,#0F3D38)}
  /* 下：パネル */
  .panel{flex:1;padding:0 64px 60px;display:flex;flex-direction:column;justify-content:center;color:#fff}
  .eyebrow{color:#F0B45A;font-weight:700;font-size:30px}
  .h{margin-top:14px;font-weight:900;font-size:82px;line-height:1.16;letter-spacing:-.01em}
  .row{margin-top:40px;display:flex;align-items:center;gap:30px}
  .cta{background:#E89B3C;color:#0A2C28;font-weight:900;font-size:38px;padding:28px 56px;border-radius:999px}
  .badges{display:flex;flex-direction:column;gap:8px;font-size:25px;font-weight:700;color:#CFE2DB}
  .badges span::before{content:"●";color:#F0B45A;margin-right:9px}
</style></head>
<body>
<div class="banner">
  <div class="photo">
    <img class="bgimg" src="../assets/ogp.jpg" alt="" />
    <div class="topgrad"></div>
    <img class="logo" src="../assets/logo.png" alt="支払いリセット計画" />
    <div class="fade"></div>
  </div>
  <div class="panel">
    <div class="eyebrow">家賃も、ローンも、まとめて。</div>
    <div class="h">毎月の支払い、<br>見直しませんか？</div>
    <div class="row">
      <div class="cta">無料で診断する</div>
      <div class="badges"><span>相談無料</span><span>オンライン対応</span><span>秘密厳守</span></div>
    </div>
  </div>
</div>
</body></html>
