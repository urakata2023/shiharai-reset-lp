<!doctype html>
<html lang="ja"><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#ccc}
  .banner{width:1080px;height:1080px;position:relative;overflow:hidden;background:#FAF7F1;
    font-family:"Zen Kaku Gothic New","Noto Sans JP",sans-serif;color:#1B2722;padding:70px;display:flex;flex-direction:column}
  .logo{height:54px}
  .eyebrow{margin-top:40px;color:#D6862A;font-weight:700;font-size:28px}
  .h{margin-top:14px;font-weight:900;font-size:66px;line-height:1.22;letter-spacing:-.01em}
  .h em{color:#D6862A;font-style:normal}
  .row{margin-top:54px;display:flex;align-items:center;gap:28px}
  .chips{display:flex;flex-direction:column;gap:14px;flex:1}
  .chip{background:#fff;border:1px solid rgba(15,61,56,.12);border-radius:18px;padding:20px 26px;font-weight:700;font-size:30px;color:#1B2722;box-shadow:0 10px 30px -16px rgba(15,61,56,.25)}
  .arrow{font-size:64px;color:#E89B3C;font-weight:900}
  .house{flex:1;background:#0F3D38;border-radius:24px;padding:34px;text-align:center;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:230px}
  .house svg{width:78px;height:78px;fill:#F0B45A}
  .house b{font-size:34px;font-weight:900}
  .house small{font-size:23px;color:#CFE2DB;font-weight:500}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .sub{font-size:30px;font-weight:700;color:#114B43}
  .cta{background:#E89B3C;color:#0A2C28;font-weight:900;font-size:34px;padding:24px 46px;border-radius:999px}
</style></head>
<body>
<div class="banner">
  <img class="logo" src="../assets/logo.png" alt="支払いリセット計画" />
  <div class="eyebrow">毎月の支払い、見直しませんか？</div>
  <div class="h">家賃も支払いも、<br><em>ひとつの住宅ローン</em>に。</div>
  <div class="row">
    <div class="chips">
      <div class="chip">カードローン</div>
      <div class="chip">車のローン</div>
      <div class="chip">家賃</div>
    </div>
    <div class="arrow">→</div>
    <div class="house">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 2 11h3v9h6v-6h2v6h6v-9h3z"/></svg>
      <b>住宅ローン</b>
      <small>ひとつにまとめる</small>
    </div>
  </div>
  <div class="foot">
    <div class="sub">毎月の負担、<br>軽くなるかも。</div>
    <div class="cta">無料診断はこちら</div>
  </div>
</div>
</body></html>
